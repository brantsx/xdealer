project_id = "xdealer"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "25MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173/app/dashboard"]
enable_signup = true

[functions.analyse-vehicle]
verify_jwt = true

[functions.analyse-marketplace-listing]
verify_jwt = true

[functions.publish-marketplace-listing]
verify_jwt = true

[functions.place-bid]
verify_jwt = true

[functions.make-offer]
verify_jwt = true

[functions.respond-offer]
verify_jwt = true
